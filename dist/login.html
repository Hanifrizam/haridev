<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - HARI DEV</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#020202;--surface:#0a0a0a;--border:rgba(255,255,255,0.08);--text:#fff;--muted:#888;--cyan:#22d3ee;--blue:#2563eb;--danger:#ef4444;--success:#22c55e}
html{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow-x:hidden}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:100%;height:100%;background:radial-gradient(ellipse at 30% 50%,rgba(37,99,235,0.12),transparent 60%),radial-gradient(ellipse at 70% 50%,rgba(34,211,238,0.08),transparent 60%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:440px;padding:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:40px 32px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-bottom:32px;justify-content:center}
.logo svg{width:32px;height:32px}
.logo span{font-size:22px;font-weight:800;background:linear-gradient(135deg,#2563eb,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.tabs{display:flex;gap:0;margin-bottom:28px;background:rgba(255,255,255,0.04);border-radius:10px;padding:4px}
.tab{flex:1;padding:10px;text-align:center;border:none;background:transparent;color:var(--muted);font-size:14px;font-weight:600;cursor:pointer;border-radius:8px;transition:all .2s}
.tab.active{background:rgba(34,211,238,0.12);color:var(--cyan)}
.form-group{margin-bottom:18px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--muted);margin-bottom:6px}
.form-group input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--cyan)}
.form-group input::placeholder{color:#555}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;transition:opacity .2s;margin-top:6px}
.btn-primary{background:linear-gradient(135deg,#2563eb,#22d3ee);color:#fff}
.btn-primary:hover{opacity:0.9}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed}
.extra-fields{overflow:hidden;max-height:0;transition:max-height .4s ease,padding .4s ease;padding:0 0}
.extra-fields.open{max-height:400px;padding:4px 0 0}
.msg{padding:12px 14px;border-radius:10px;font-size:13px;margin-top:12px;display:none}
.msg.error{display:block;background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.2);color:var(--danger)}
.msg.success{display:block;background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.2);color:var(--success)}
.msg.info{display:block;background:rgba(34,211,238,0.1);border:1px solid rgba(34,211,238,0.2);color:var(--cyan)}
.back-link{display:block;text-align:center;margin-top:20px;color:var(--muted);font-size:13px;text-decoration:none}
.back-link:hover{color:var(--cyan)}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){.card{padding:28px 20px}}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <a href="index.html" class="logo">
      <svg viewBox="0 0 32 32" fill="none"><rect width="32" height="32" rx="8" fill="url(#lg)"/><path d="M9 16l5-5 5 5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 21V11" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><defs><linearGradient id="lg" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#2563eb"/><stop offset="1" stop-color="#22d3ee"/></linearGradient></defs></svg>
      <span>HARI DEV</span>
    </a>

    <div class="tabs">
      <button class="tab active" data-tab="signin">Sign In</button>
      <button class="tab" data-tab="signup">Request Access</button>
    </div>

    <form id="authForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@email.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Min. 6 karakter" minlength="6" required>
      </div>

      <div class="extra-fields" id="extraFields">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Nama lengkap">
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" placeholder="0812xxxxxx">
        </div>
        <div class="form-group">
          <label>Birth Date</label>
          <input type="date" id="birthDate">
        </div>
      </div>

      <button class="btn btn-primary" id="submitBtn" type="submit">
        <span id="btnLabel">Sign In</span>
      </button>
    </form>

    <div id="msgBox" class="msg"></div>
    <a href="index.html" class="back-link">&larr; Back to Home</a>
  </div>
</div>

<script>
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const tabs = document.querySelectorAll('.tab');
const form = document.getElementById('authForm');
const email = document.getElementById('email');
const password = document.getElementById('password');
const fullName = document.getElementById('fullName');
const phone = document.getElementById('phone');
const birthDate = document.getElementById('birthDate');
const extraFields = document.getElementById('extraFields');
const btnLabel = document.getElementById('btnLabel');
const submitBtn = document.getElementById('submitBtn');
const msgBox = document.getElementById('msgBox');
let mode = 'signin';

tabs.forEach(t => {
  t.addEventListener('click', () => {
    tabs.forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    mode = t.dataset.tab;
    extraFields.classList.toggle('open', mode === 'signup');
    btnLabel.textContent = mode === 'signin' ? 'Sign In' : 'Submit Request';
    msgBox.className = 'msg';
    msgBox.textContent = '';
    [fullName, phone, birthDate].forEach(el => el.required = mode === 'signup');
  });
});

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  msgBox.className = 'msg';
  submitBtn.disabled = true;
  submitBtn.innerHTML = '<span class="spinner"></span> Processing...';

  try {
    if (mode === 'signin') {
      const { data, error } = await sb.auth.signInWithPassword({
        email: email.value,
        password: password.value
      });
      if (error) throw error;
      const { data: profile } = await sb.from('profiles').select('*').eq('id', data.user.id).single();
      if (!profile) throw new Error('Profile tidak ditemukan');
      if (profile.status === 'pending') {
        await sb.auth.signOut();
        msgBox.className = 'msg info';
        msgBox.textContent = 'Akun Anda sedang direview oleh Admin. Silakan coba lagi nanti.';
      } else if (profile.status === 'rejected') {
        await sb.auth.signOut();
        msgBox.className = 'msg error';
        msgBox.textContent = 'Akun Anda ditolak. Hubungi admin untuk informasi lebih lanjut.';
      } else if (profile.status === 'approved') {
        if (profile.role === 'admin') window.location.href = 'admin.html';
        else window.location.href = 'dashboard.html';
      }
    } else {
      const { data, error } = await sb.auth.signUp({
        email: email.value,
        password: password.value,
        options: {
          data: {
            full_name: fullName.value,
            phone_number: phone.value,
            birth_date: birthDate.value
          }
        }
      });
      if (error) throw error;
      msgBox.className = 'msg success';
      msgBox.textContent = 'Akun Anda sedang direview oleh Admin. Kami akan mengirim email setelah disetujui.';
      setTimeout(() => {
        tabs[0].click();
        form.reset();
      }, 5000);
    }
  } catch (err) {
    msgBox.className = 'msg error';
    msgBox.textContent = err.message || 'Terjadi kesalahan';
  } finally {
    submitBtn.disabled = false;
    submitBtn.innerHTML = '<span id="btnLabel">' + (mode === 'signin' ? 'Sign In' : 'Submit Request') + '</span>';
  }
});
</script>
</body>
</html>
